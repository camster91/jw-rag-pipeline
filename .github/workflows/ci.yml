name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest src/ --tb=short -q || echo "No tests yet — skipping"
      - run: python -c "import ast; [ast.parse(open(f'src/{f}').read()) for f in ['api.py','04_query.py','03_embed.py','02_chunk.py','01_extract.py']]; print('Syntax OK')"
